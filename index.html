function parseICS(t){const evs=[];const bl=t.split("BEGIN:VEVENT");for(let i=1;i<bl.length;i++){const b=bl[i].split("END:VEVENT")[0];const g=k=>{const m=b.match(new RegExp(k+"[^:]*:(.+?)\\r?\\n","s"));return m?m[1].replace(/\\n/g," ").trim():""};const ev={title:g("SUMMARY")||"(No title)",location:g("LOCATION")};const ds=g("DTSTART"),de=g("DTEND");if(ds){ev.start=pICS(ds);ev.end=de?pICS(de):ev.start;ev.allDay=ds.replace(/TZID=[^:]+:/,"").trim().length===8;evs.push(ev)}}return evs}
function pICS(s){s=s.replace(/TZID=[^:]+:/,"").trim();if(s.length===8)return new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));const y=+s.slice(0,4),mo=+s.slice(4,6)-1,d=+s.slice(6,8),h=+s.slice(9,11)||0,mi=+s.slice(11,13)||0;return s.endsWith("Z")?new Date(Date.UTC(y,mo,d,h,mi)):new Date(y,mo,d,h,mi)}
