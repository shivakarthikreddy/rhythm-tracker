if(S.showAddS){html+=`<div class="fw" id="sF"><div class="ftl">New Recurring Item</div><input class="fi2" id="sT2" placeholder="Title..." autofocus><div class="frow"><input class="fi2" id="sTm" type="time" value="09:00" style="flex:1"><select class="fi2" id="sD" style="flex:1">${DAYS.map((d,i)=>`<option value="${i}"${i===now.getDay()?" selected":""}>${d}</option>`).join("")}</select></div><div class="cpk">${CL.map((c,i)=>`<button class="cdo${i===1?" s":""}" style="background:${c.fill}" onclick="sCS(this,${i})"></button>`).join("")}</div><div class="fac"><button class="fbcan" onclick="S.showAddS=false;render()">Cancel</button><button class="fbsav" onclick="subSc()">Add</button></div></div>`}else html+=`<button class="addb" onclick="S.showAddS=true;render()"><span style="font-size:16px">+</span> Add Recurring Item</button>`}
if(S.view==="reports"){let totalC=0,bestS=0;S.habits.forEach(h=>{const s=gS(h.id,S.comp);if(s>bestS)bestS=s;Object.keys(S.comp).forEach(k=>{if(k.startsWith(h.id+"::"))totalC++})});
html+=`<div class="rc" style="animation:fadeUp .3s ease"><div class="rt2">Overview</div><div class="sg"><div class="sbox"><div class="sval" style="color:var(--ac)">${totalC}</div><div class="slab">Check-ins</div></div><div class="sbox"><div class="sval" style="color:var(--amb)">${bestS}d</div><div class="slab">Best Streak</div></div><div class="sbox"><div class="sval" style="color:var(--blue)">${S.habits.length}</div><div class="slab">Habits</div></div></div></div>`;
html+=`<div class="rc" style="animation:fadeUp .3s ease .05s both"><div class="rt2">Weekly Completion</div><div class="bch">`;for(let w=7;w>=0;w--){const ws=wkd(-w);let d2=0,t2=S.habits.length*7;ws.forEach(d=>{S.habits.forEach(h=>{if(S.comp[h.id+"::"+dk(d)])d2++})});const p=t2?Math.round(d2/t2*100):0;html+=`<div class="bcl"><div class="bvl">${p}%</div><div class="bar2" style="height:${Math.max(p,3)}%;background:${w===0?"var(--ac)":"var(--s3)"}"></div><div class="bll">${MO[ws[0].getMonth()].slice(0,3)} ${ws[0].getDate()}</div></div>`}html+=`</div></div>`;
html+=`<div class="rc" style="animation:fadeUp .3s ease .1s both"><div class="rt2">Last 30 Days</div>`;S.habits.forEach(h=>{const c=CL[h.ci%CL.length];let d30=0;for(let i=0;i<30;i++){const d=new Date;d.setDate(d.getDate()-i);if(S.comp[h.id+"::"+dk(d)])d30++}const p=Math.round(d30/30*100);html+=`<div class="hrw"><div class="hicon" style="background:${c.bg}22;border:1.5px solid ${c.bg}66;width:24px;height:24px;border-radius:7px;font-size:12px;flex-shrink:0">${h.icon}</div><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.name}</div><div class="hbb"><div class="hbf" style="width:${p}%;background:${c.fill}"></div></div></div><div class="hpc" style="color:${c.fill}">${p}%</div></div>`});html+=`</div>`;
html+=`<div class="rc" style="animation:fadeUp .3s ease .15s both"><div class="rt2">30-Day Heatmap</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;for(let i=29;i>=0;i--){const d=new Date;d.setDate(d.getDate()-i);let dn=0;S.habits.forEach(h=>{if(S.comp[h.id+"::"+dk(d)])dn++});const int=S.habits.length?dn/S.habits.length:0;html+=`<div style="aspect-ratio:1;border-radius:4px;background:rgba(74,222,128,${Math.max(.06,int)});position:relative">${dk(d)===today?'<div style="position:absolute;inset:0;border:1.5px solid var(--ac);border-radius:4px"></div>':""}</div>`}const rem=(7-30%7)%7;for(let i=0;i<rem;i++)html+=`<div style="aspect-ratio:1;border-radius:4px;background:var(--s2);opacity:.3"></div>`;html+=`</div></div>`;
html+=`<button class="expb" onclick="exCSV()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 10l3 3 3-3M7 2v11"/></svg>Export CSV (90 days)</button>`}
if(S.view==="settings"){html+=`<div class="rc" style="animation:fadeUp .3s ease"><div class="rt2">Account</div><div style="display:flex;align-items:center;gap:12px;padding:10px 0"><div class="uav">${ini}</div><div style="flex:1"><div style="font-size:14px;font-weight:600">${uName}</div><div style="font-size:11px;color:var(--tx3)">${U.email}</div></div></div><button class="expb" onclick="doLogout()" style="color:var(--dng);margin-top:6px;border-color:rgba(248,113,113,.15)">Sign Out</button></div>`;
html+=`<div class="rc" style="animation:fadeUp .3s ease .05s both"><div class="rt2">Notifications</div><div class="srow"><div><div class="slbl">Habit Reminders</div><div class="sdsc">At habit time + 1hr follow-up</div></div><div class="tog${S.notifOn?" on":""}" onclick="reqNotif()"><div class="tog-k"></div></div></div><div class="srow"><div><div class="slbl">End-of-Day Summary</div><div class="sdsc">Incomplete habits summary</div></div><input type="time" value="${String(S.eodH).padStart(2,"0")}:${String(S.eodM).padStart(2,"0")}" style="background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:5px 9px;color:var(--tx);font-family:var(--mono);font-size:12px" onchange="const p=this.value.split(':');S.eodH=+p[0];S.eodM=+p[1];save();if(S.notifOn)schedNotif()"></div></div>`;
html+=`<div class="rc" style="animation:fadeUp .3s ease .08s both"><div class="rt2">Features</div><div class="srow"><div><div class="slbl">Schedule & Calendar</div><div class="sdsc">Show schedule tab with ICS sync</div></div><div class="tog${S.schedOn?" on":""}" onclick="S.schedOn=!S.schedOn;if(!S.schedOn&&S.view==='schedule')S.view='habits';save();render()"><div class="tog-k"></div></div></div></div>`;
if(S.schedOn){html+=`<div class="rc" style="animation:fadeUp .3s ease .1s both"><div class="rt2">Calendar</div><div style="padding:6px 0"><div class="slbl" style="margin-bottom:6px">ICS Feed URL</div><input class="fi2" style="font-size:11px;margin:0" value="${S.calUrl.replace(/"/g,"&quot;")}" oninput="S.calUrl=this.value;save()" placeholder="Paste .ics calendar URL"><div class="sdsc" style="margin-top:8px"><strong>Teams/Outlook:</strong> Settings → Calendar → Shared calendars → Publish → ICS<br><br><strong>Apple Calendar:</strong> iCloud.com → Calendar → Share → Public Calendar</div></div></div>`}
html+=`<div class="rc" style="animation:fadeUp .3s ease .12s both"><div class="rt2">Install as App</div><div style="font-size:12px;color:var(--tx2);line-height:1.7;padding:6px 0"><strong>iPhone:</strong> Safari → Share → Add to Home Screen<br><strong>Android:</strong> Chrome → ⋮ → Add to Home Screen</div></div>`;
html+=`<button class="expb" onclick="resetAll()" style="color:var(--dng)">Reset All Data</button>`}
html+=`<nav class="bnav"><button class="nb${S.view==="habits"?" a":""}" onclick="setV('habits')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>${missed.length&&S.view!=="habits"?`<span class="bdg">${missed.length}</span>`:""}Habits</button>${S.schedOn?`<button class="nb${S.view==="schedule"?" a":""}" onclick="setV('schedule')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Schedule</button>`:""}<button class="nb${S.view==="reports"?" a":""}" onclick="setV('reports')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Reports</button><button class="nb${S.view==="settings"?" a":""}" onclick="setV('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</button></nav></div>`;
R.innerHTML=html}
// Global error catcher — never show blank screen
window.onerror=function(msg,src,line){document.getElementById("root").innerHTML='<div style="padding:40px 20px;font-family:sans-serif"><h2 style="color:#f87171">Error</h2><p style="color:#999;margin-top:10px;font-size:13px;word-break:break-all">'+msg+'</p><p style="color:#555;margin-top:6px;font-size:11px">Line: '+line+'</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;border-radius:10px;background:#4ade80;color:#0d0d0d;border:none;font-weight:700;cursor:pointer">Reload</button></div>'};
try{render()}catch(e){window.onerror(e.message,"",0)}
</script>
</body>
