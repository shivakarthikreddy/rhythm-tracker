<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1012">
<title>Rhythm — Habit & Schedule Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1012;--s1:#181A1E;--s2:#21232A;--s3:#2B2D35;--br:#33363F;--tx:#ECEAE6;--tx2:#8C8A92;--tx3:#5A5862;--ac:#6EE7B7;--ac2:#34D399;--acd:rgba(110,231,183,0.12);--dng:#F87171;--dngd:rgba(248,113,113,0.1);--blue:#60A5FA;--amb:#FBBF24;--rose:#FB7185;--purp:#A78BFA;--r:14px;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;padding-top:var(--st)}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select{font-family:var(--font);outline:none}
::-webkit-scrollbar{width:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}

/* ═══ AUTH SCREENS ═══ */
.auth-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px 20px}
.auth-card{width:100%;max-width:380px;animation:fadeUp .5s ease}
.auth-logo{font-size:36px;font-weight:800;letter-spacing:-1px;text-align:center;margin-bottom:6px}
.auth-logo em{font-style:normal;color:var(--ac)}
.auth-sub{text-align:center;font-size:13px;color:var(--tx2);margin-bottom:36px}
.auth-form{background:var(--s1);border-radius:18px;padding:28px 24px;border:1px solid var(--br)}
.auth-title{font-size:20px;font-weight:700;margin-bottom:4px}
.auth-desc{font-size:12px;color:var(--tx2);margin-bottom:24px}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.auth-input{width:100%;padding:12px 14px;border-radius:11px;border:1px solid var(--br);background:var(--s2);color:var(--tx);font-size:14px;transition:border-color .2s}
.auth-input:focus{border-color:var(--ac)}
.auth-input::placeholder{color:var(--tx3)}
.auth-btn{width:100%;padding:14px;border-radius:11px;background:var(--ac);color:var(--bg);font-size:14px;font-weight:700;margin-top:8px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.auth-btn:active{transform:scale(.98)}
.auth-btn:disabled{opacity:.6;cursor:not-allowed}
.auth-link{text-align:center;margin-top:20px;font-size:13px;color:var(--tx2)}
.auth-link a{color:var(--ac);text-decoration:none;font-weight:600;cursor:pointer}
.auth-link a:hover{text-decoration:underline}
.auth-err{background:var(--dngd);color:var(--dng);font-size:12px;font-weight:500;padding:10px 14px;border-radius:10px;margin-bottom:14px;animation:shake .4s ease;display:flex;align-items:center;gap:6px}
.auth-success{background:var(--acd);color:var(--ac);font-size:12px;font-weight:500;padding:10px 14px;border-radius:10px;margin-bottom:14px}
.auth-forgot{text-align:right;margin-top:-8px;margin-bottom:14px}
.auth-forgot a{font-size:11px;color:var(--tx3);text-decoration:none;cursor:pointer}
.auth-forgot a:hover{color:var(--ac)}
.spinner{width:18px;height:18px;border:2px solid transparent;border-top-color:var(--bg);border-radius:50%;animation:spin .6s linear infinite}

/* ═══ APP ═══ */
.app{max-width:480px;margin:0 auto;padding:0 16px;padding-bottom:calc(74px + var(--sb))}
.hdr{padding:20px 0 16px;display:flex;align-items:center;justify-content:space-between;animation:fadeUp .4s ease}
.logo{font-size:25px;font-weight:800;letter-spacing:-.5px}
.logo em{font-style:normal;color:var(--ac)}
.date-tag{font-family:var(--mono);font-size:10px;color:var(--tx2);background:var(--s1);padding:5px 10px;border-radius:16px;margin-top:4px}
.ring-w{position:relative;width:50px;height:50px}
.ring-l{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ac)}
.notif-banner{background:var(--acd);border:1px solid rgba(110,231,183,0.2);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;animation:fadeUp .3s ease;cursor:pointer}
.notif-text{font-size:12px;font-weight:500;flex:1}
.notif-text small{display:block;color:var(--tx2);font-weight:400;margin-top:2px}
.missed-alert{background:linear-gradient(135deg,rgba(248,113,113,0.08),rgba(251,191,36,0.06));border:1px solid rgba(248,113,113,0.15);border-radius:var(--r);padding:14px;margin-bottom:14px;animation:fadeUp .3s ease}
.missed-title{font-size:13px;font-weight:700;color:var(--dng);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.missed-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--br);font-size:12px}
.missed-item:last-child{border-bottom:none}
.missed-item button{padding:5px 12px;border-radius:7px;background:var(--ac);color:var(--bg);font-size:11px;font-weight:700}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,16,18,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--br);padding:6px 0 calc(6px + var(--sb));display:flex;justify-content:space-around}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;color:var(--tx3);font-size:9px;font-weight:500;padding:6px 12px;border-radius:10px;position:relative}
.nb.act{color:var(--ac)}
.nb svg{width:21px;height:21px}
.nb .badge{position:absolute;top:2px;right:6px;width:16px;height:16px;border-radius:50%;background:var(--dng);color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.wk-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.wk-nav button{width:34px;height:34px;border-radius:10px;background:var(--s1);color:var(--tx2);font-size:16px;display:flex;align-items:center;justify-content:center;border:1px solid var(--br)}
.wk-label{font-family:var(--mono);font-size:11px;color:var(--tx2);font-weight:500}
.dh{display:grid;grid-template-columns:1fr repeat(7,36px);gap:3px;margin-bottom:6px;padding:0 2px}
.dh-c{text-align:center;font-family:var(--mono);font-size:9px;font-weight:600;color:var(--tx3)}
.dh-c.td{color:var(--ac)}
.dn{width:21px;height:21px;line-height:21px;border-radius:50%;margin:2px auto 0;font-size:10px;text-align:center}
.dn.td{background:var(--ac);color:var(--bg);font-weight:700}
.hr{display:grid;grid-template-columns:1fr repeat(7,36px);gap:3px;align-items:center;padding:10px 2px;border-bottom:1px solid var(--br)}
.hi{display:flex;align-items:center;gap:7px;min-width:0}
.hic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.hn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hm{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-top:1px}
.cb{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .2s}
.cb.d{color:#fff}.cb.u{background:var(--s2);color:var(--br);transform:scale(.88)}
.cal-feed-box{background:var(--s1);border-radius:var(--r);padding:16px;margin-bottom:14px;animation:fadeUp .3s ease}
.cal-feed-box label{font-size:12px;font-weight:600;color:var(--tx2);display:block;margin-bottom:8px}
.cal-input-row{display:flex;gap:6px}
.cal-input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--br);background:var(--s2);color:var(--tx);font-size:12px;font-family:var(--mono)}
.cal-input::placeholder{color:var(--tx3)}
.cal-sync-btn{padding:10px 16px;border-radius:10px;background:var(--ac);color:var(--bg);font-size:12px;font-weight:700;white-space:nowrap}
.cal-status{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-top:8px;display:flex;align-items:center;gap:5px}
.cal-ev{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--s1);border-radius:12px;margin-bottom:6px;border-left:3px solid}
.cal-ev-time{font-family:var(--mono);font-size:11px;font-weight:600;min-width:90px;flex-shrink:0}
.cal-ev-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-ev-loc{font-size:10px;color:var(--tx3);margin-top:2px}
.cal-day-hdr{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx3);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.cal-day-hdr.td{color:var(--ac)}
.sec-title{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--br)}
.rc{background:var(--s1);border-radius:var(--r);padding:16px;margin-bottom:12px}
.rt{font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sb2{background:var(--s2);border-radius:12px;padding:14px 8px;text-align:center}
.sv{font-family:var(--mono);font-size:20px;font-weight:700}
.sl{font-size:9px;color:var(--tx3);margin-top:3px;font-weight:500}
.bc{display:flex;align-items:flex-end;gap:3px;height:110px;padding:0 2px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.bar{width:100%;border-radius:4px 4px 1px 1px;min-height:2px;transition:height .5s ease}
.blbl{font-family:var(--mono);font-size:8px;color:var(--tx3)}
.bval{font-family:var(--mono);font-size:8px;color:var(--tx2);font-weight:600}
.hrr{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--br)}
.hrr:last-child{border-bottom:none}
.hbb{flex:1;height:7px;background:var(--s2);border-radius:4px;overflow:hidden}
.hbf{height:100%;border-radius:4px;transition:width .6s ease}
.hp{font-family:var(--mono);font-size:11px;font-weight:600;min-width:34px;text-align:right}
.fw{background:var(--s1);border-radius:var(--r);padding:16px;margin-top:10px;animation:fadeUp .25s ease}
.ftt{font-size:14px;font-weight:700;margin-bottom:14px}
.fi{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--br);background:var(--s2);color:var(--tx);font-size:13px;margin-bottom:8px}
.fi::placeholder{color:var(--tx3)}
.fr{display:flex;gap:8px}
.ig{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}
.ib{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--s2);border:2px solid transparent;color:var(--tx)}
.ib.s{border-color:var(--ac);background:var(--acd)}
.cg{display:flex;gap:5px;margin:8px 0}
.cd{width:26px;height:26px;border-radius:50%;border:2px solid transparent}
.cd.s{border-color:#fff;transform:scale(1.12)}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.bc2{padding:8px 16px;border-radius:8px;background:transparent;color:var(--tx2);font-size:12px;font-weight:500;border:1px solid var(--br)}
.bs{padding:8px 18px;border-radius:8px;background:var(--ac);color:var(--bg);font-size:12px;font-weight:700}
.ab{width:100%;padding:13px;margin-top:10px;border:1px dashed var(--br);border-radius:var(--r);background:transparent;color:var(--tx3);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px}
.eb{width:100%;padding:13px;margin-top:8px;border-radius:var(--r);background:var(--s1);color:var(--ac);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--br)}
.dr{display:flex;justify-content:flex-end;padding-top:6px;grid-column:1/-1}
.db{padding:5px 12px;border-radius:6px;background:var(--dngd);color:var(--dng);font-size:10px;font-weight:600}
.empty{text-align:center;padding:36px 0;color:var(--tx3);font-size:12px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--br)}
.set-row:last-child{border-bottom:none}
.set-label{font-size:13px;font-weight:500}
.set-desc{font-size:10px;color:var(--tx3);margin-top:2px;line-height:1.5}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--s3);position:relative;cursor:pointer;transition:all .2s;flex-shrink:0}
.toggle.on{background:var(--ac)}
.toggle-knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:all .2s}
.toggle.on .toggle-knob{left:22px}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--s1);border-radius:10px;padding:8px 12px;margin-bottom:14px;font-size:12px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--ac);color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.loading-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-screen .spinner{width:28px;height:28px;border-width:3px;border-top-color:var(--ac)}
</style>
</head>
<body>

<div id="root"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  FIREBASE CONFIG — Replace with your own Firebase keys  ║
// ╚══════════════════════════════════════════════════════════╝
 const firebaseConfig = {
    apiKey: "AIzaSyA274EZvnH3Iw9hwC1r4KwOCRWTr9oO1R8",
    authDomain: "rhythm-5b48c.firebaseapp.com",
    projectId: "rhythm-5b48c",
    storageBucket: "rhythm-5b48c.firebasestorage.app",
    messagingSenderId: "83016307894",
    appId: "1:83016307894:web:af48ef89af534ba68f0217",
    measurementId: "G-MCRHDHHQJL"
  };

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ─── CONSTANTS ───
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const CL=[{bg:"#D1FAE5",fill:"#10B981"},{bg:"#DBEAFE",fill:"#3B82F6"},{bg:"#FEF3C7",fill:"#F59E0B"},{bg:"#FCE7F3",fill:"#EC4899"},{bg:"#EDE9FE",fill:"#8B5CF6"},{bg:"#CFFAFE",fill:"#06B6D4"},{bg:"#FEE2E2",fill:"#EF4444"},{bg:"#E0E7FF",fill:"#6366F1"}];
const IC=["✦","◆","●","▲","★","♦","◉","⊕","⬡","⏣","♠","⧫"];
const DEF_HABITS=[{id:"h1",name:"Morning Run",icon:"✦",ci:0,time:"06:30",cat:"Health"},{id:"h2",name:"Read 30 min",icon:"◆",ci:4,time:"21:00",cat:"Growth"},{id:"h3",name:"Meditate",icon:"●",ci:5,time:"07:00",cat:"Wellness"}];

function dk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function wkd(o=0){const n=new Date,s=new Date(n);s.setDate(n.getDate()-n.getDay()+o*7);return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d})}
function gS(id,c){let s=0;const t=new Date;for(let i=0;i<365;i++){const d=new Date(t);d.setDate(t.getDate()-i);if(c[id+"::"+dk(d)])s++;else if(i>0)break}return s}
function fT(h,m){return`${((h%12)||12)}:${String(m).padStart(2,"0")} ${h>=12?"PM":"AM"}`}
function pT(s){const p=s.split(":");return{h:parseInt(p[0]),m:parseInt(p[1]||0)}}

// ─── APP STATE ───
let currentUser=null;
let authScreen="login"; // login | signup | forgot
let authLoading=false;
let authError="";
let authSuccess="";
let appLoading=true;

let S={habits:[...DEF_HABITS],comp:{},sched:[],calUrl:"",calEvents:[],calLastSync:null,calSyncing:false,view:"habits",wo:0,showAdd:false,showAddS:false,editH:null,editS:null,notifOn:false,notifDis:{},eodH:21,eodM:0};

// ─── FIRESTORE SYNC ───
let unsubFirestore=null;

function userDocRef(){
  if(!currentUser)return null;
  return db.collection("users").doc(currentUser.uid);
}

async function saveToCloud(){
  const ref=userDocRef();
  if(!ref)return;
  try{
    const data={habits:S.habits,comp:S.comp,sched:S.sched,calUrl:S.calUrl,calEvents:S.calEvents,calLastSync:S.calLastSync,notifOn:S.notifOn,eodH:S.eodH,eodM:S.eodM,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    await ref.set(data,{merge:true});
  }catch(e){console.error("Save error:",e)}
}

async function loadFromCloud(){
  const ref=userDocRef();
  if(!ref)return;
  try{
    const doc=await ref.get();
    if(doc.exists){
      const d=doc.data();
      S.habits=d.habits||[...DEF_HABITS];
      S.comp=d.comp||{};
      S.sched=d.sched||[];
      S.calUrl=d.calUrl||"";
      S.calEvents=d.calEvents||[];
      S.calLastSync=d.calLastSync||null;
      S.notifOn=d.notifOn||false;
      S.eodH=d.eodH||21;
      S.eodM=d.eodM||0;
    }
  }catch(e){console.error("Load error:",e)}
}

function save(){saveToCloud()}

// Debounce save
let saveTimer=null;
function debounceSave(){clearTimeout(saveTimer);saveTimer=setTimeout(save,800)}

// ─── AUTH LISTENERS ───
auth.onAuthStateChanged(async(user)=>{
  currentUser=user;
  if(user){
    await loadFromCloud();
    appLoading=false;
    if(S.notifOn)schedN();
    render();
  }else{
    appLoading=false;
    S={habits:[...DEF_HABITS],comp:{},sched:[],calUrl:"",calEvents:[],calLastSync:null,calSyncing:false,view:"habits",wo:0,showAdd:false,showAddS:false,editH:null,editS:null,notifOn:false,notifDis:{},eodH:21,eodM:0};
    render();
  }
});

// ─── AUTH ACTIONS ───
async function doLogin(){
  const email=document.getElementById("authEmail")?.value?.trim();
  const pass=document.getElementById("authPass")?.value;
  if(!email||!pass){authError="Please fill in all fields.";render();return}
  authLoading=true;authError="";render();
  try{await auth.signInWithEmailAndPassword(email,pass)}
  catch(e){authError=friendlyError(e.code);authLoading=false;render()}
}

async function doSignup(){
  const name=document.getElementById("authName")?.value?.trim();
  const email=document.getElementById("authEmail")?.value?.trim();
  const pass=document.getElementById("authPass")?.value;
  const pass2=document.getElementById("authPass2")?.value;
  if(!name||!email||!pass){authError="Please fill in all fields.";render();return}
  if(pass!==pass2){authError="Passwords don't match.";render();return}
  if(pass.length<6){authError="Password must be at least 6 characters.";render();return}
  authLoading=true;authError="";render();
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
    // Create default data
    await db.collection("users").doc(cred.user.uid).set({habits:[...DEF_HABITS],comp:{},sched:[],calUrl:"",calEvents:[],calLastSync:null,notifOn:false,eodH:21,eodM:0,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  }catch(e){authError=friendlyError(e.code);authLoading=false;render()}
}

async function doForgot(){
  const email=document.getElementById("authEmail")?.value?.trim();
  if(!email){authError="Enter your email address.";render();return}
  authLoading=true;authError="";render();
  try{await auth.sendPasswordResetEmail(email);authSuccess="Password reset email sent! Check your inbox.";authLoading=false;render()}

// ─── ICS Parser ───
function parseICS(t){const evs=[];const bl=t.split("BEGIN:VEVENT");for(let i=1;i<bl.length;i++){const b=bl[i].split("END:VEVENT")[0];const g=k=>{const m=b.match(new RegExp(k+"[^:]*:(.+?)\\r?\\n","s"));return m?m[1].replace(/\\n/g," ").trim():""};const ev={title:g("SUMMARY")||"(No title)",location:g("LOCATION"),description:g("DESCRIPTION")};const ds=g("DTSTART"),de=g("DTEND");if(ds){ev.start=pICS(ds);ev.end=de?pICS(de):ev.start;ev.allDay=ds.replace(/TZID=[^:]+:/,"").trim().length===8;evs.push(ev)}}return evs}
function pICS(s){s=s.replace(/TZID=[^:]+:/,"").trim();if(s.length===8)return new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));const y=+s.slice(0,4),mo=+s.slice(4,6)-1,d=+s.slice(6,8),h=+s.slice(9,11)||0,mi=+s.slice(11,13)||0;return s.endsWith("Z")?new Date(Date.UTC(y,mo,d,h,mi)):new Date(y,mo,d,h,mi)}
async function syncCal(){if(!S.calUrl.trim())return;S.calSyncing=true;render();try{let r;try{r=await fetch(S.calUrl.trim())}catch(e){r=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(S.calUrl.trim()))}if(!r.ok)throw new Error(r.status);const t=await r.text();S.calEvents=parseICS(t);S.calLastSync=new Date().toISOString();S.calSyncing=false;debounceSave();render()}catch(e){S.calSyncing=false;render();alert("Could not sync. Ensure URL is a public .ics link.\n\nTeams: Outlook > Settings > Calendar > Shared calendars > Publish > Copy ICS.\nApple: iCloud.com > Calendar > Share > Public Calendar.\n\n"+e.message)}}

// ─── Notifications ───
async function reqNotif(){if(!("Notification" in window)){alert("Notifications not supported.");return}const p=await Notification.requestPermission();S.notifOn=p==="granted";debounceSave();render();if(S.notifOn)schedN()}
let nT=[];
function schedN(){nT.forEach(t=>clearTimeout(t));nT=[];if(!S.notifOn)return;const now=new Date,tdk=dk(now);
S.habits.forEach(h=>{const t=pT(h.time),tar=new Date(now);tar.setHours(t.h,t.m,0,0);let d1=tar-now;
if(d1>0)nT.push(setTimeout(()=>{if(!S.comp[h.id+"::"+tdk])new Notification("Rhythm — "+h.name,{body:"Time to do it!",tag:"h-"+h.id})},d1));
let d2=d1+3600000;if(d2>0)nT.push(setTimeout(()=>{if(!S.comp[h.id+"::"+tdk])new Notification("Missed: "+h.name,{body:"Still not logged!",tag:"m-"+h.id})},d2))});
const eod=new Date(now);eod.setHours(S.eodH,S.eodM,0,0);let ed=eod-now;
if(ed>0)nT.push(setTimeout(()=>{const ms=S.habits.filter(h=>!S.comp[h.id+"::"+tdk]);if(ms.length)new Notification("Rhythm — End of Day",{body:ms.length+" incomplete: "+ms.map(h=>h.name).join(", "),tag:"eod"});else new Notification("Rhythm — Perfect Day!",{body:"All done!",tag:"eod"})},ed))}
document.addEventListener("visibilitychange",()=>{if(!document.hidden&&S.notifOn)schedN()});

  html+=`<div class="rc" style="animation:fadeUp .3s ease .15s both"><div class="rt">30-Day Heatmap</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;
  for(let i=29;i>=0;i--){const d=new Date;d.setDate(d.getDate()-i);let dn=0;S.habits.forEach(h=>{if(S.comp[h.id+"::"+dk(d)])dn++});const int=S.habits.length?dn/S.habits.length:0;html+=`<div style="aspect-ratio:1;border-radius:4px;background:rgba(110,231,183,${Math.max(.06,int)});position:relative">${dk(d)===today?'<div style="position:absolute;inset:0;border:1.5px solid var(--ac);border-radius:4px"></div>':""}</div>`}
  const rem=(7-30%7)%7;for(let i=0;i<rem;i++)html+=`<div style="aspect-ratio:1;border-radius:4px;background:var(--s2);opacity:.3"></div>`;
  html+=`</div></div>`;
  html+=`<button class="eb" onclick="exCSV()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11l3.5 3 3.5-3M7.5 2v12"/></svg>Export CSV (90 days)</button>`;
}

// SETTINGS
if(S.view==="settings"){
  html+=`<div class="rc" style="animation:fadeUp .3s ease">
    <div class="rt">Account</div>
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0">
      <div class="user-avatar">${initials}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${userName}</div><div style="font-size:11px;color:var(--tx3)">${currentUser.email}</div></div>
    </div>
    <button class="eb" onclick="doLogout()" style="color:var(--dng);margin-top:8px;border-color:rgba(248,113,113,0.2)">Sign Out</button>
  </div>`;

  html+=`<div class="rc" style="animation:fadeUp .3s ease .05s both"><div class="rt">Notifications</div>
    <div class="set-row"><div><div class="set-label">Habit Reminders</div><div class="set-desc">At habit time + 1hr if missed</div></div><div class="toggle${S.notifOn?" on":""}" onclick="reqNotif()"><div class="toggle-knob"></div></div></div>
    <div class="set-row"><div><div class="set-label">End-of-Day Summary</div><div class="set-desc">Daily incomplete habits summary</div></div><input type="time" value="${String(S.eodH).padStart(2,"0")}:${String(S.eodM).padStart(2,"0")}" style="background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:6px 10px;color:var(--tx);font-family:var(--mono);font-size:12px" onchange="const p=this.value.split(':');S.eodH=+p[0];S.eodM=+p[1];debounceSave();if(S.notifOn)schedN()"></div></div>`;

  html+=`<div class="rc" style="animation:fadeUp .3s ease .1s both"><div class="rt">Calendar</div>
    <div style="padding:8px 0"><div class="set-label" style="margin-bottom:8px">ICS Feed URL</div>
    <input class="fi" style="font-size:11px;margin:0" value="${S.calUrl.replace(/"/g,"&quot;")}" oninput="S.calUrl=this.value;debounceSave()" placeholder="Paste .ics calendar URL">
    <div class="set-desc" style="margin-top:8px"><strong>Teams/Outlook:</strong> Settings → Calendar → Shared calendars → Publish → Copy ICS<br><br><strong>Apple Calendar:</strong> iCloud.com → Calendar → Share → Public Calendar → Copy link</div></div></div>`;

  html+=`<div class="rc" style="animation:fadeUp .3s ease .15s both"><div class="rt">Install as App</div>
    <div style="font-size:12px;color:var(--tx2);line-height:1.7;padding:8px 0"><strong>iPhone:</strong> Safari → Share → Add to Home Screen<br><strong>Android:</strong> Chrome → ⋮ → Add to Home Screen</div></div>`;

  html+=`<button class="eb" onclick="resetAll()" style="color:var(--dng)">Reset All Data</button>`;
}

// NAV
html+=`<nav class="bnav">
  <button class="nb${S.view==="habits"?" act":""}" onclick="setV('habits')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>${missed.length&&S.view!=="habits"?`<span class="badge">${missed.length}</span>`:""}Habits</button>
  <button class="nb${S.view==="schedule"?" act":""}" onclick="setV('schedule')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Schedule</button>
  <button class="nb${S.view==="reports"?" act":""}" onclick="setV('reports')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Reports</button>
  <button class="nb${S.view==="settings"?" act":""}" onclick="setV('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</button>
</nav>`;

html+=`</div>`;
root.innerHTML=html;
}
</script>
</body>
</html>
